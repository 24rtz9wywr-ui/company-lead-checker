
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Company Lead Checker</title>

<style>
body{
font-family:Arial;
max-width:1100px;
margin:auto;
padding:20px;
}

h1{
color:#1f2937;
}

input{
padding:10px;
}

button{
padding:10px 20px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:left;
}

th{
background:#f3f4f6;
}

.progress{
width:100%;
height:20px;
background:#ddd;
margin-top:20px;
}

.bar{
height:20px;
width:0%;
background:#22c55e;
}
</style>

</head>
<body>

<h1>Company Lead Checker</h1>

<h3>Upload CSV</h3>

<input type="file" id="csvFile">

<button onclick="loadCSV()">Load Companies</button>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<table>

<thead>
<tr>
<th>Company</th>
<th>Website</th>
<th>Phone</th>
<th>Email</th>
<th>Status</th>
</tr>
</thead>

<tbody id="results"></tbody>

</table>

<script>

function loadCSV(){

const file=document.getElementById("csvFile").files[0];

if(!file){
alert("Choose a CSV file");
return;
}

const reader=new FileReader();

reader.onload=function(e){

const rows=e.target.result.split("\n");

let html="";

rows.forEach((row,index)=>{

if(row.trim()!=""){

html+=`
<tr>
<td>${row}</td>
<td>Searching...</td>
<td>Searching...</td>
<td>Searching...</td>
<td>Pending</td>
</tr>
`;

document.getElementById("bar").style.width=
((index+1)/rows.length*100)+"%";

}

});

document.getElementById("results").innerHTML=html;

}

reader.readAsText(file);

}

</script>

</body>
</html>
