<!DOCTYPE html>
<html>
<head>
    <title>Company Lead Checker</title>
    <meta charset="UTF-8">
    <style>
        body{
            font-family: Arial, sans-serif;
            max-width:900px;
            margin:auto;
            padding:20px;
        }

        textarea{
            width:100%;
            height:200px;
        }

        button{
            padding:10px 20px;
            margin-top:10px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
        }

        th,td{
            border:1px solid #ccc;
            padding:8px;
        }
    </style>
</head>
<body>

<h1>Company Lead Checker</h1>

<p>Paste company names (one per line):</p>

<textarea id="companies"></textarea>

<br>

<button onclick="searchCompanies()">Search</button>

<table>
<thead>
<tr>
<th>Company</th>
<th>Website</th>
<th>Phone</th>
<th>Status</th>
</tr>
</thead>

<tbody id="results"></tbody>
</table>

<script>

function searchCompanies(){

let companies = document.getElementById("companies").value.split("\n");

let results = document.getElementById("results");

results.innerHTML = "";

companies.forEach(company=>{

if(company.trim() !== ""){

results.innerHTML += `
<tr>
<td>${company}</td>
<td>Coming Soon</td>
<td>Coming Soon</td>
<td>Pending</td>
</tr>
`;

}

});

}

</script>

</body>
</html>
