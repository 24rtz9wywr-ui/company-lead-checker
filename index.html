
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Company Lead Checker</title>

<style>
body{
font-family:Arial;
max-width:1100px;
margin:auto;
padding:20px;
}

h1{
color:#1f2937;
}

input{
padding:10px;
}

button{
padding:10px 20px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:left;
}

th{
background:#f3f4f6;
}

.progress{
width:100%;
height:20px;
background:#ddd;
margin-top:20px;
}

.bar{
height:20px;
width:0%;
background:#22c55e;
}
</style>

</head>
<body>

<h1>Company Lead Checker</h1>

<h3>Upload CSV</h3>

<input type="file" id="csvFile">

<button onclick="loadCSV()">Load Companies</button>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<table>

<thead>
<tr>
<th>Company</th>
<th>Website</th>
<th>Phone</th>
<th>Email</th>
<th>Status</th>
</tr>
</thead>

<tbody id="results"></tbody>

</table>
<script>

async function loadCSV(){

const file=document.getElementById("csvFile").files[0];

if(!file){
alert("Choose a CSV file");
return;
}

const reader=new FileReader();

reader.onload=async function(e){

const rows=e.target.result
.split("\n")
.filter(x=>x.trim()!="");

let html="";

for(let i=0;i<rows.length;i++){

let company=rows[i].trim();

document.getElementById("bar").style.width=
((i+1)/rows.length*100)+"%";

try{

let response=await fetch(
"/api/search?company="+encodeURIComponent(company)
);

let data=await response.json();

html+=`
<tr>
<td>${company}</td>
<td>
<a href="${data.search}" target="_blank">
Search
</a>
</td>
<td>-</td>
<td>-</td>
<td>Checked</td>
</tr>
`;

}
catch{

html+=`
<tr>
<td>${company}</td>
<td>Error</td>
<td>-</td>
<td>-</td>
<td>Error</td>
</tr>
`;

}

document.getElementById("results").innerHTML=html;

}

}

reader.readAsText(file);

}

</script>

</body>
</html>
